  <style>
    :root {
      --lime: #ceff00;
      --black: #080808;
      --gray: #1a1a1a;
      --gray-border: #2a2a2a;
      --white: #ffffff;
      --white-dim: rgba(255,255,255,0.5);
      --font-display: 'Switzer', sans-serif;
      --font-body: 'Bricolage Grotesque', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background-color: var(--black);
      color: var(--white);
      font-family: var(--font-body);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      position: relative;
      z-index: 1;
    }

    /* ── LOGO ── */
    .logo-wrap {
      width: 100%;
      max-width: 320px;
      animation: fadeDown 0.7s ease both;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
    }

    /* ── BIO ── */
    .bio {
      text-align: center;
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white-dim);
      line-height: 1.7;
      animation: fadeDown 0.7s 0.1s ease both;
      margin-top: -32px;
    }

    /* ── EVENTO ── */
    .event-section {
      width: 100%;
      animation: fadeDown 0.7s 0.2s ease both;
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--lime);
      font-weight: 400;
      margin-bottom: 12px;
      font-family: var(--font-body);
    }

    .event-card {
      border: 1px solid var(--gray-border);
      border-radius: 4px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--gray);
      position: relative;
      overflow: hidden;
    }

    .event-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--lime);
    }

    .event-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 0.02em;
      color: var(--white);
      line-height: 1.05;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .event-date {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white-dim);
      font-family: var(--font-body);
      font-weight: 300;
    }

    .event-btn {
      display: inline-block;
      background: var(--lime);
      color: var(--black);
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 13px 20px;
      border-radius: 2px;
      text-align: center;
      transition: opacity 0.2s ease, transform 0.15s ease;
    }

    .event-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .event-btn:active {
      transform: translateY(0);
    }

    /* ── SOCIAL ICONS ── */
    .socials-section {
      width: 100%;
      animation: fadeDown 0.7s 0.3s ease both;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--white-dim);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: var(--font-body);
      font-weight: 300;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .social-link:hover {
      color: var(--lime);
      transform: translateY(-3px);
    }

    .social-link:hover .icon-wrap {
      border-color: var(--lime);
    }

    .social-link:hover svg path,
    .social-link:hover svg rect,
    .social-link:hover svg circle,
    .social-link:hover svg polygon {
      fill: var(--lime);
    }

    .icon-wrap {
      width: 52px;
      height: 52px;
      border: 1px solid var(--gray-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s ease;
      background: var(--gray);
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
    }

    .icon-wrap svg path,
    .icon-wrap svg rect,
    .icon-wrap svg circle,
    .icon-wrap svg polygon {
      fill: var(--white);
      transition: fill 0.2s ease;
    }

    /* ── FOOTER ── */
    .footer {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      font-family: var(--font-body);
      font-weight: 300;
      animation: fadeDown 0.7s 0.4s ease both;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 400px) {
      body { padding: 40px 16px 60px; }
      .event-name { font-size: 1.6rem; }
      .logo-wrap { max-width: 260px; }
      .social-icons { gap: 20px; }
    }
  </style>
</head>
